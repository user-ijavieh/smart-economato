<div class="modal-overlay" (click)="onOverlayClick($event)">
  <form #editForm="ngForm" (ngSubmit)="onSubmit()" class="modal-content">
    <div class="modal-header">
      <h2>Editar Proveedor</h2>
      <button type="button" class="modal-close" (click)="onClose()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full-width">
          <label for="name">Nombre *</label>
          <input
            type="text"
            id="name"
            [(ngModel)]="formData.name"
            name="name"
            required
            minlength="2"
            maxlength="100"
            placeholder="Nombre del proveedor"
          />
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-delete" (click)="onDelete()">Eliminar</button>
      <div class="modal-footer-right">
        <button type="button" class="btn-cancel" (click)="onClose()">Cancelar</button>
        <button type="submit" class="btn-save" [disabled]="!editForm.valid">Guardar Cambios</button>
      </div>
    </div>
  </form>
</div>
